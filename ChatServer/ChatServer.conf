# AIChatServer 配置文件
# 该文件由 gflags 的 --flagfile 参数解析
# 使用方式: ./AIChatServer --flagfile=ChatServer.conf

# 服务器绑定地址
--ip=0.0.0.0

# 服务器监听端口
--port=8080

# 日志级别: TRACE, DEBUG, INFO, WARN, ERROR, CRITICAL
--log_level=INFO

# 模型生成温度，取值范围 [0.0, 2.0]
--temperature=0.7

# 最大生成 token 数
--max_tokens=2048

# Ollama 本地模型名称
--ollama_model_name=deepseek-r1:1.5b

# Ollama 本地模型描述
--ollama_model_desc="Local DeepSeek Model"

# Ollama 服务端点地址
--ollama_endpoint=http://localhost:11434
